name: Fetch Daily Verse

on:
  schedule:
    - cron: '0 17 * * *'  # 01:00 Taiwan time (UTC+8)
  workflow_dispatch:       # 允許手動觸發

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: data

      - name: Fetch and parse daily verse
        run: |
          # curl --insecure bypasses the incomplete certificate chain on breadoflife.taipei
          curl -s -L --insecure \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -H "Accept: text/html,application/xhtml+xml" \
            -H "Accept-Language: zh-TW,zh;q=0.9,en;q=0.8" \
            "https://www.breadoflife.taipei/news/daily-bible/" > /tmp/daily-bible.html

          cat << 'SCRIPT' > /tmp/parse-verse.js
          const fs = require('fs');
          const html = fs.readFileSync('/tmp/daily-bible.html', 'utf8');
          const match = html.match(/(\d{4}-\d{2}-\d{2})\s*<span>\|<\/span>\s*<span>\s*([^<]+?)\s*<\/span>/s);
          if (!match) {
            console.error('Pattern not found. HTML length: ' + html.length);
            console.error('Snippet: ' + html.substring(0, 500));
            process.exit(1);
          }
          const data = { date: match[1], rawRange: match[2].trim(), fetchedAt: new Date().toISOString() };
          fs.writeFileSync('daily-verse.json', JSON.stringify(data, null, 2) + '\n');
          console.log('Fetched:', JSON.stringify(data));
          SCRIPT
          node /tmp/parse-verse.js

      - name: Commit and push if changed
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add daily-verse.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update daily verse $(date -u +%Y-%m-%d)"
            git push origin data
          fi
