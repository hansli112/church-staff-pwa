<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="教會同工全方位助手">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="竹圍靈糧福音中心">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>竹圍靈糧福音中心</title>
  <link rel="manifest" href="manifest.json">
  <style>
    /* Remove the browser focus ring on Flutter's HTML text editing element. */
    .flt-text-editing,
    .flt-text-editing * {
      outline: none !important;
      box-shadow: none !important;
      -webkit-tap-highlight-color: transparent;
      -webkit-appearance: none;
      border: none !important;
      background: transparent !important;
      color: transparent !important;
      caret-color: transparent;
    }

    .flt-text-editing:focus,
    .flt-text-editing:focus-within,
    .flt-text-editing textarea:focus,
    .flt-text-editing input:focus {
      outline: none !important;
      box-shadow: none !important;
    }

    #app-loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #ffffff;
      color: #1f2937;
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      z-index: 9999;
    }

    #app-loading .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #d1d5db;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    #app-loading .title {
      font-size: 18px;
      font-weight: 600;
      line-height: 1.4;
    }

    #app-loading .subtitle {
      font-size: 14px;
      color: #4b5563;
      text-align: center;
      line-height: 1.5;
      max-width: 320px;
      padding: 0 16px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <div id="app-loading" role="status" aria-live="polite">
    <div class="spinner" aria-hidden="true"></div>
    <div class="title">載入中</div>
    <div class="subtitle" id="app-loading-message">首次開啟或有更新時會需要較久時間，請稍候。</div>
  </div>

  <script>
    let isUpdateInProgress = false;

    function setLoadingMessage(text) {
      const message = document.getElementById('app-loading-message');
      if (message) {
        message.textContent = text;
      }
    }

    function hideLoadingScreen() {
      const loading = document.getElementById('app-loading');
      if (loading) {
        loading.remove();
      }
    }

    window.addEventListener('flutter-first-frame', hideLoadingScreen);

    setTimeout(function () {
      if (!isUpdateInProgress) {
        setLoadingMessage('正在下載最新內容，請保持網路連線並稍候。');
      }
    }, 7000);

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.addEventListener('controllerchange', function () {
        isUpdateInProgress = false;
        window.location.reload();
      });

      navigator.serviceWorker.ready
        .then(function (registration) {
          registration.update();

          registration.addEventListener('updatefound', function () {
            const newWorker = registration.installing;
            if (!newWorker) {
              return;
            }

            isUpdateInProgress = true;
            setLoadingMessage('發現新版本，正在下載更新...');

            newWorker.addEventListener('statechange', function () {
              if (newWorker.state === 'installed') {
                if (navigator.serviceWorker.controller) {
                  setLoadingMessage('更新下載完成，正在套用新版本...');
                  newWorker.postMessage({ type: 'SKIP_WAITING' });
                } else {
                  isUpdateInProgress = false;
                }
              } else if (newWorker.state === 'redundant') {
                isUpdateInProgress = false;
                setLoadingMessage('更新失敗，請重新整理後再試。');
              }
            });
          });
        })
        .catch(function () {
          // Ignore service worker readiness errors.
        });

      window.addEventListener('load', function () {
        navigator.serviceWorker
          .register('firebase-messaging-sw.js', {
            scope: 'firebase-cloud-messaging-push-scope',
          })
          .catch(function (error) {
            console.error('Firebase messaging SW registration failed:', error);
          });
      });
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
